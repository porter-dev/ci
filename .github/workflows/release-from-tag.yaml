name: Release
on:
  workflow_dispatch:
    inputs:
      tagVersion:
        description: "Tag version to release"
        required: true
        type: string
      workDir:
        description: "Directory where the .goreleaser.yaml file is located"
        required: true
        type: string
      checkoutTag:
        description: "Tag to checkout in the code repo"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubicloud-standard-8-arm
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.PORTER_CI_CLIENT_ID }}
          private-key: ${{ secrets.PORTER_CI_APP_PRIVATE_KEY }}
          owner: porter-dev
          repositories: code,releases,homebrew-porter

      - name: Checkout porter-dev/code at ${{ github.event.inputs.checkoutTag }}
        uses: actions/checkout@v4
        with:
          repository: porter-dev/code
          ref: ${{ github.event.inputs.checkoutTag }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-tags: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Clean Go
        run: |
          rm -rf ~/go/pkg/mod
          rm -rf ~/.cache/go-build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Docker logins
        run: echo $GITHUB_TOKEN | docker login ghcr.io -u USERNAME --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          workdir: ${{ github.event.inputs.workDir }}
          distribution: goreleaser
          version: v2
          args: release --clean --parallelism=4 --skip validate
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GORELEASER_CURRENT_TAG: ${{ github.event.inputs.tagVersion }}
          RELEASE_BUCKET: ${{ vars.RELEASE_BUCKET }}
          RELEASE_BUCKET_REGION: ${{ vars.RELEASE_BUCKET_REGION }}
          RELEASE_BUCKET_ENDPOINT: ${{ vars.RELEASE_BUCKET_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}

      # The CLI's brew formula is generated by GoReleaser (brews.skip_upload: true)
      # but only pushed to homebrew-porter when the release is promoted. Stash the
      # generated formula on the GitHub release so the promote-porter-cli workflow
      # can publish the exact formula computed against these artifacts.
      - name: Upload Homebrew formula to release
        if: ${{ github.event.inputs.workDir == 'legacy-backend/cli' }}
        run: |
          formula=$(find "${{ github.event.inputs.workDir }}/dist" -name 'porter.rb' | head -1)
          if [ -z "$formula" ]; then
            echo "No porter.rb formula found in dist output"
            exit 1
          fi
          gh release upload "${{ github.event.inputs.tagVersion }}" "$formula" \
            --repo porter-dev/releases --clobber
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
